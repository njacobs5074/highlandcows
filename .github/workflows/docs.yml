name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:  # allow manual trigger from the Actions tab

# Required for the deploy-pages action to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; don't cancel in-flight deployments.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build documentation
        run: cargo doc --no-deps --workspace

      # GitHub Pages won't serve a directory listing, so add a root
      # index.html that redirects straight to the main crate's docs.
      - name: Add root redirect
        run: |
          echo '<meta http-equiv="refresh" content="0; url=highlandcows_isam">' \
            > target/doc/index.html

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
